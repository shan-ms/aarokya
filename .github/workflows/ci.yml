name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  NODE_ENV: test

jobs:
  backend-test:
    name: Backend (Rust)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: aarokya_test
          POSTGRES_USER: aarokya
          POSTGRES_PASSWORD: aarokya_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aarokya"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://aarokya:aarokya_test@localhost:5432/aarokya_test
      JWT_SECRET: ci-test-secret
      JWT_EXPIRY_HOURS: "1"
      PORT: "8080"
      HOST: 0.0.0.0
      RUST_LOG: aarokya_backend=debug
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            backend/target
          key: cargo-${{ runner.os }}-${{ hashFiles('backend/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Check formatting
        working-directory: backend
        run: cargo fmt -- --check

      - name: Run clippy
        working-directory: backend
        run: cargo clippy --all-targets -- -D warnings

      - name: Run cargo check
        working-directory: backend
        run: cargo check --all-targets

      - name: Run tests
        working-directory: backend
        run: cargo test --all-targets

  customer-test:
    name: Customer App (React Native)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/customer
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/customer/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test -- --passWithNoTests --ci --coverage

  partner-test:
    name: Partner App (React Native)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/partner
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/partner/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test -- --passWithNoTests --ci --coverage

  control-center-test:
    name: Control Center (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/control-center
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/control-center/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
