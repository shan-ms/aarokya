name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/aarokya

permissions:
  contents: read
  packages: write

jobs:
  ci-check:
    name: Wait for CI
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI workflow
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: "Backend (Rust)"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 15

      - name: Wait for Control Center CI
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.sha }}
          check-name: "Control Center (Next.js)"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 15

  build-backend:
    name: Build Backend Image
    needs: ci-check
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-backend
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-control-center:
    name: Build Control Center Image
    needs: ci-check
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-control-center
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.control-center
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Environment
    needs: [build-backend, build-control-center]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      # ---------------------------------------------------------------
      # Replace the placeholder steps below with your deployment target.
      # Examples: SSH + docker-compose, Kubernetes apply, AWS ECS update.
      # ---------------------------------------------------------------

      - name: Deploy Backend
        run: |
          echo "Deploying backend image: ${{ env.IMAGE_PREFIX }}-backend:${{ steps.tag.outputs.sha }}"
          echo "TODO: Add deployment commands for your infrastructure"
          # Example for docker-compose on remote host:
          # ssh deploy@${{ secrets.DEPLOY_HOST }} \
          #   "cd /opt/aarokya && \
          #    IMAGE_TAG=${{ steps.tag.outputs.sha }} \
          #    docker compose -f docker-compose.prod.yml pull && \
          #    docker compose -f docker-compose.prod.yml up -d"

      - name: Deploy Control Center
        run: |
          echo "Deploying control-center image: ${{ env.IMAGE_PREFIX }}-control-center:${{ steps.tag.outputs.sha }}"
          echo "TODO: Add deployment commands for your infrastructure"

      - name: Verify deployment
        run: |
